name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ۱. واکشی کدهای ریپازیتوری
    - name: Checkout the code
      uses: actions/checkout@v4

    # ۲. تنظیم نسخه جاوا
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ۳. پیدا کردن خودکار فایل gradlew و دادن دسترسی اجرایی به آن (در هر پوشه‌ای که باشد)
    - name: Find and Grant execute permission for gradlew
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew not found anywhere in the repository!"
          exit 1
        fi
        echo "Found gradlew at: $GRADLEW_PATH"
        chmod +x "$GRADLEW_PATH"
        # ذخیره مسیر برای استفاده در مراحل بعدی
        echo "GRADLEW_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

    # ۴. اجرای فرآیند بیلد درون پوشه‌ای که gradlew پیدا شده
    - name: Build with Gradle
      run: |
        cd ${{ env.GRADLEW_DIR }}
        ./gradlew assembleDebug

    # ۵. پیدا کردن خودکار فایل APK و آپلود آن
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
