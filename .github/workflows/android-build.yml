name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ۱. واکشی کدهای ریپازیتوری
    - name: Checkout the code
      uses: actions/checkout@v4

    # ۲. تنظیم نسخه جاوا
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ۳. نصب ابزار گریدل روی سرور گیت‌هاب
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # ۴. پیدا کردن پوشه‌ای که build.gradle.kts در آن است و اجرای بیلد با دستور سیستم
    - name: Build with system Gradle
      run: |
        BUILD_DIR=$(dirname $(find . -name "build.gradle.kts" | head -n 1))
        echo "Building in directory: $BUILD_DIR"
        cd "$BUILD_DIR"
        gradle assembleDebug

    # ۵. پیدا کردن و آپلود فایل APK خروجی
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
