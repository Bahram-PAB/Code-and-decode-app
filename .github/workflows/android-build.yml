name: Android CI/CD Build

# تعیین زمان اجرای اکشن (با هر Push یا Pull Request روی برانچ اصلی)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ۱. واکشی کدهای ریپازیتوری
    - name: Checkout the code
      uses: actions/checkout@v4

    # ۲. تنظیم نسخه جاوا (برای پروژه‌های جدید اندروید نسخه ۱۷ پیشنهاد می‌شود)
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ۳. دسترسی دادن به فایل گریدل برای اجرا در لینوکس
    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    # ۴. اجرای فرآیند بیلد نسخه دیباگ اپلیکیشن
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # ۵. ذخیره و آپلود فایل APK نهایی در گیت‌هاب برای دانلود شما
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Code-and-decode-app-vxx
        path: app/build/outputs/apk/debug/app-debug.apk
